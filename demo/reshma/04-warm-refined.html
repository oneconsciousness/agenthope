<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Per-page title mirrors demo/index.html naming convention; the engine's
     alternate templates ship without a <title> since they're personless. -->
<title>Reshma Saujani — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{color-scheme:light dark;--paper:#F3EDE3;--paper2:#EFE7DA;--card:#FBF6EE;--cardh:#FFFCF5;--ink:#221B12;--ink2:#5C4F3D;--ink3:#756751;--line:rgba(34,27,18,.10);--line2:rgba(34,27,18,.06);--orange:#C2620E;--orange2:#9C4E0A;--teal:#1F7A6B;--gold:#B8860B;--shadow:0 1px 2px rgba(34,27,18,.05),0 8px 24px -12px rgba(34,27,18,.16);--serif:"Spectral",Georgia,serif;--sans:"Inter",system-ui,sans-serif;--mono:"JetBrains Mono",monospace}
/* ── Dark theme — warm near-black paper, warm off-white ink, brightened orange/teal/gold accents ── */
[data-theme="dark"]{color-scheme:dark;--paper:#1A1611;--paper2:#221D16;--card:#221C15;--cardh:#2A2318;--ink:#F1E9DC;--ink2:#C4B7A3;--ink3:#9A8D7A;--line:rgba(241,233,220,.12);--line2:rgba(241,233,220,.07);--orange:#E8873A;--orange2:#D9822F;--teal:#4FB3A0;--gold:#D9A93A;--shadow:0 1px 2px rgba(0,0,0,.4),0 10px 28px -14px rgba(0,0,0,.7)}
/* dark overrides for colors set outside :root — retint accent fills, flip pill text to dark ink on bright accent for AA */
[data-theme="dark"] .badge{background:rgba(232,135,58,.14);border-color:rgba(232,135,58,.30)}
[data-theme="dark"] .badge.none{background:rgba(79,179,160,.12);border-color:rgba(79,179,160,.30)}
[data-theme="dark"] .projmetric{background:rgba(232,135,58,.14);border-color:rgba(232,135,58,.30)}
[data-theme="dark"] .live{color:var(--paper)}
[data-theme="dark"] .soc-pinned{color:var(--paper)}
*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;font-size:14.5px;line-height:1.6}
.wr{max-width:980px;margin:0 auto;padding:48px 36px 96px}
.lbl{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--orange)}
.hero{display:grid;grid-template-columns:168px 1fr;gap:34px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:34px;box-shadow:var(--shadow)}
.photo{width:168px;height:168px;border-radius:16px;object-fit:cover;border:1px solid var(--line)}
.name{font-family:var(--serif);font-size:clamp(30px,7vw,46px);font-weight:600;letter-spacing:-.02em;line-height:1;margin:10px 0 0;overflow-wrap:anywhere}
.headline{font-family:var(--serif);font-style:italic;font-size:19px;color:var(--ink2);margin:10px 0 0;line-height:1.35;overflow-wrap:anywhere}
.meta{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:16px;font-family:var(--mono);font-size:11px;color:var(--ink3)}
.meta a{color:var(--orange2);text-decoration:none}
.meta .link-icon{display:inline-flex;align-items:center;gap:4px}
.meta .link-icon svg{width:13px;height:13px}
.summary{font-family:var(--serif);font-size:21px;line-height:1.55;color:var(--ink);margin:40px 0 0;max-width:820px}
.summary b{color:var(--orange);font-weight:600}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:36px 0}
.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 18px 16px;box-shadow:var(--shadow)}
.stat .v{font-family:var(--serif);font-size:33px;font-weight:700;letter-spacing:-.02em;color:var(--orange);line-height:1}
.stat .k{font-size:11.5px;color:var(--ink2);margin-top:9px;line-height:1.4}
.sec{margin-top:56px}
.sectitle{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.sectitle h2{font-family:var(--serif);font-size:25px;font-weight:600;margin:0;letter-spacing:-.01em}
.sectitle .fill{flex:1;height:1px;background:var(--line)}
.tl{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:8px 24px;box-shadow:var(--shadow)}
.tlrow{display:grid;grid-template-columns:120px 1fr auto;gap:18px;align-items:center;padding:14px 0;border-bottom:1px solid var(--line2)}
.tlrow:last-child{border-bottom:0}
.tldate{font-family:var(--mono);font-size:11px;color:var(--ink3)}
.tllabel{font-family:var(--serif);font-size:17px}
.tldot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--orange);margin-right:10px;vertical-align:middle}
.tldot.edu{background:var(--teal)}
.tlorg{color:var(--ink2);font-style:italic;font-size:14px}
.tlmetric{font-family:var(--mono);font-size:11px;color:var(--orange2);text-align:right;white-space:nowrap}
.role{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:26px 28px;margin-bottom:16px;box-shadow:var(--shadow)}
.rh{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;flex-wrap:wrap;padding-bottom:16px;border-bottom:1px solid var(--line2)}
.rt{font-family:var(--serif);font-size:23px;font-weight:600;letter-spacing:-.01em;line-height:1.1}
.rco{color:var(--orange);font-weight:600}
.rd{font-family:var(--mono);font-size:11px;color:var(--ink3);white-space:nowrap;margin-top:4px}
.live{display:inline-block;font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:var(--orange);border-radius:20px;padding:3px 9px;margin-left:10px;vertical-align:middle}
.contribs{display:flex;flex-direction:column;gap:18px;margin-top:18px}
.contrib{display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:start}
.badge{font-family:var(--serif);font-size:19px;font-weight:700;color:var(--orange);background:rgba(194,98,14,.08);border:1px solid rgba(194,98,14,.18);border-radius:10px;padding:10px 14px;white-space:nowrap;text-align:center;min-width:96px;line-height:1.2}
.badge.none{background:rgba(31,122,107,.07);border-color:rgba(31,122,107,.18);color:var(--teal);font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;font-weight:500;display:flex;align-items:center;justify-content:center}
.badge .bsubj{display:block;font-family:var(--mono);font-size:8.5px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;color:var(--orange2);margin-top:5px;line-height:1.35;white-space:normal}
.rkpi{font-family:var(--mono);font-size:10px;color:var(--ink3);letter-spacing:.04em;text-align:right;margin-top:6px}
.cdomain{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink3)}
.cimpact{font-size:15px;font-weight:500;line-height:1.5;margin-top:5px}
.caction{font-size:13.5px;color:var(--ink2);line-height:1.6;margin-top:6px}
.cs{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;align-items:flex-start}
.chip{font-family:var(--mono);font-size:10px;color:var(--ink2);background:var(--paper2);border:1px solid var(--line2);border-radius:6px;padding:3px 9px;white-space:nowrap}
.cols{display:grid;grid-template-columns:1.4fr 1fr;gap:18px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px;box-shadow:var(--shadow)}
.skcat{margin-bottom:22px}.skcat:last-child{margin-bottom:0}
.skcat h3{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink);margin:0 0 12px;font-weight:600}
.sk{display:grid;grid-template-columns:1fr 90px 44px;gap:12px;align-items:center;padding:6px 0}
.sk .nm{font-size:14px}
.track{height:7px;background:var(--paper2);border-radius:20px;overflow:hidden}
.fillb{height:100%;background:linear-gradient(90deg,var(--gold),var(--orange));border-radius:20px}
.yr{font-family:var(--mono);font-size:10px;color:var(--ink3);text-align:right}
.edu{padding:13px 0;border-bottom:1px solid var(--line2)}.edu:last-child{border-bottom:0}
.edu .d{font-family:var(--serif);font-size:16px;font-weight:600}
.edu .i{color:var(--ink2);font-size:13px;font-style:italic}
.edu .y{font-family:var(--mono);font-size:10px;color:var(--ink3);margin-top:2px}
.interests{font-family:var(--serif);font-style:italic;color:var(--ink2);font-size:15px;line-height:1.7}
.foot{margin-top:64px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--ink3)}
/* ── Projects section ─────────────────────────────────────────── */
.proj{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:24px 28px;margin-bottom:16px;box-shadow:var(--shadow)}
.projhead{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;flex-wrap:wrap}
.projname{font-family:var(--serif);font-size:20px;font-weight:600;letter-spacing:-.01em}
.projdate{font-family:var(--mono);font-size:11px;color:var(--ink3);white-space:nowrap;margin-top:4px}
.projtag{font-family:var(--serif);font-style:italic;font-size:14.5px;color:var(--ink2);margin-top:6px;line-height:1.45}
.projmetric{display:inline-block;font-family:var(--mono);font-size:10.5px;color:var(--orange);background:rgba(194,98,14,.08);border:1px solid rgba(194,98,14,.18);border-radius:20px;padding:2px 10px;margin-left:8px;vertical-align:middle;font-weight:500}
.projdesc{font-size:13.5px;color:var(--ink2);line-height:1.6;margin:10px 0 0}
.projimpact{font-size:14px;font-weight:500;line-height:1.5;margin:8px 0 0;color:var(--ink)}
.cskills{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.projlink{margin-top:12px}
.projlink a{font-family:var(--mono);font-size:11.5px;color:var(--orange);text-decoration:none;font-weight:500}
.projlink a:hover{text-decoration:underline}
/* ── Resume ATS section ───────────────────────────────────────── */
.resume-view{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:32px 34px;box-shadow:var(--shadow);font-size:14px;line-height:1.6}
.resume-view h2{font-family:var(--serif);font-size:26px;font-weight:700;margin:0 0 4px;letter-spacing:-.01em;color:var(--ink)}
.resume-view h3{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--orange);margin:22px 0 8px;font-weight:600;border-bottom:1px solid var(--line2);padding-bottom:6px}
.resume-headline{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--ink2);margin:0 0 6px}
.resume-contact{font-family:var(--mono);font-size:11px;color:var(--ink3);margin-bottom:6px}
.resume-contact a{color:var(--orange);text-decoration:none}
.resume-summary{color:var(--ink2);margin:0 0 6px}
.rentry{margin-bottom:14px}
.rentry:last-child{margin-bottom:0}
.rentryhead{display:flex;justify-content:space-between;align-items:baseline;gap:12px;flex-wrap:wrap}
.rtitle{font-family:var(--serif);font-weight:600;font-size:15px}
.rdates{font-family:var(--mono);font-size:10.5px;color:var(--ink3);white-space:nowrap}
.rorg{color:var(--orange);font-weight:600;font-size:13.5px;margin-bottom:4px}
.resume-view ul{margin:4px 0 0;padding-left:20px;color:var(--ink2);font-size:13.5px}
.resume-view li{margin-bottom:3px}
.resume-view li strong{color:var(--ink3);font-weight:500}
.resume-skills{color:var(--ink2);margin:0;font-size:13px}
/* ── Social section ───────────────────────────────────────────── */
.soc-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.soc-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 22px;box-shadow:var(--shadow)}
.soc-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.soc-head svg{width:18px;height:18px;color:var(--orange)}
.soc-platform{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink2);font-weight:500}
.soc-pinned{font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:var(--teal);border-radius:20px;padding:2px 8px;margin-left:auto}
.soc-caption{font-size:13.5px;color:var(--ink2);line-height:1.55;margin-bottom:10px}
.soc-link{font-family:var(--mono);font-size:11.5px;color:var(--orange);text-decoration:none;font-weight:500}
.soc-link:hover{text-decoration:underline}
/* ── Footer generation line ───────────────────────────────────── */
.foot-gen{margin-top:24px;text-align:center;font-family:var(--mono);font-size:11px;color:var(--ink3)}
.foot-gen a{color:var(--orange);text-decoration:none}
.foot-gen a:hover{text-decoration:underline}
@media(max-width:820px){.wr{padding:30px 18px}.hero{grid-template-columns:1fr;text-align:center;justify-items:center}.name{font-size:38px}.stats{grid-template-columns:1fr 1fr}.cols{grid-template-columns:1fr}.contrib{grid-template-columns:1fr}.tlrow{grid-template-columns:1fr auto}.tldate{grid-column:1/-1}.soc-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script src="data.js"></script>
<script src="https://cdn.jsdelivr.net/gh/oneconsciousness/job-hunt-with-hope@3b0848f2df8cfd3af177595d30bc26104453fde4/assets/templates/portfolio/template-utils.js"></script>
<script>
(function () {
  var D = window.HOPE_DATA;
  if (!D) { document.getElementById('root').innerHTML = '<p style="padding:40px;font-family:sans-serif">No data found. Make sure <code>data.js</code> is present.</p>'; return; }

  var id = D.identity || {};
  var meta = D.meta || {};
  var links = id.links || [];

  /* ── helpers ──────────────────────────────────────────────── */
  function fyLocal(x) { return x ? x.split('-')[0] : ''; }
  function fmtPeriodLocal(s, e) { var a = fyLocal(s), b = e ? fyLocal(e) : 'Now'; return a === b ? a : a + '\u2013' + b; }

  /* ── identity / meta ─────────────────────────────────────── */
  var name      = meta.name || id.name || '';
  var headline  = meta.headline || '';
  var location  = id.location || '';
  var email     = id.email || '';
  var phone     = id.phone || '';
  var genDate   = meta.generation_date || '';
  var photo     = id.photo || '';
  var summary   = id.summary || '';

  /* ── all links ───────────────────────────────────────────── */
  var linksHtml = links.map(function (lnk) {
    if (!lnk || !lnk.url) return '';
    return '<a class="link-icon" href="' + esc(lnk.url) + '" target="_blank" rel="noopener">' +
      brandSvg(lnk.kind) + ' ' + esc(lnk.label) + '</a>';
  }).join('');

  /* ── stats ───────────────────────────────────────────────── */
  var stats = (D.overview && D.overview.headline_stats || []);
  var statsHtml = stats.map(function (s) {
    return '<div class="stat"><div class="v">' + esc(s.value) + '</div><div class="k">' + esc(s.label) + '</div></div>';
  }).join('');

  /* ── timeline ────────────────────────────────────────────── */
  var timeline = (D.timeline || []).map(function (t) {
    var period = fmtPeriodLocal(t.date_start, t.date_end);
    var label  = String(t.label||'').split(' @ ')[0];
    var org    = t.org || '';
    var metric = t.metric || '';
    var dotCls = (t.type === 'education' || t.type === 'certification') ? 'tldot edu' : 'tldot';
    return { period: period, label: label, org: org, metric: metric, dotCls: dotCls };
  });
  var timelineHtml = timeline.map(function (t) {
    return '<div class="tlrow">' +
      '<div class="tldate">' + esc(t.period) + '</div>' +
      '<div class="tllabel"><span class="' + t.dotCls + '"></span>' + esc(t.label) + ' <span class="tlorg">' + esc(t.org) + '</span></div>' +
      '<div class="tlmetric">' + esc(t.metric) + '</div>' +
    '</div>';
  }).join('');

  /* ── experience / roles ──────────────────────────────────── */
  var roles = flattenContribs(D.experience);
  var rolesHtml = roles.map(function (r) {
    var currentPill = r.is_current ? '<span class="live">Current</span>' : '';
    var itemsHtml = r.items.map(function (c) {
      var metric    = c.metric;
      var badgeCls  = metric ? 'badge' : 'badge none';
      var arrow     = metric ? metricArrow(c.metricDir) : '';
      var badgeText = metric ? (arrow ? arrow + ' ' : '') + metric : (c.kind === 'lead' ? 'Leadership' : '');
      var badgeSub  = (metric && c.metricSubject) ? '<span class="bsubj">' + esc(c.metricSubject) + '</span>' : '';
      var skillsHtml = c.skills.map(function (sk) {
        return '<span class="chip">' + esc(sk) + '</span>';
      }).join('');
      return '<div class="contrib">' +
        '<div class="' + badgeCls + '">' + esc(badgeText) + badgeSub + '</div>' +
        '<div>' +
          '<div class="cdomain">' + esc(c.domain) + '</div>' +
          '<div class="cimpact">' + esc(c.impact) + '</div>' +
          '<div class="caction">' + esc(c.action) + '</div>' +
          '<div class="cs">' + skillsHtml + '</div>' +
        '</div>' +
      '</div>';
    }).join('');
    var kp = r.kpis || {};
    var kpiBits = [];
    if (kp.ic)     kpiBits.push(kp.ic + ' delivery');
    if (kp.lead)   kpiBits.push(kp.lead + ' leadership');
    if (kp.metric) kpiBits.push(kp.metric + ' measured');
    var kpiLine = kpiBits.length ? '<div class="rkpi">' + esc(kpiBits.join(' · ')) + '</div>' : '';
    return '<div class="role">' +
      '<div class="rh"><div>' +
        '<div class="rt">' + esc(r.role_title) + currentPill + '</div>' +
        '<div class="rco" style="font-family:var(--sans);font-size:14px;margin-top:3px">' + esc(r.company) + '</div>' +
      '</div><div><div class="rd">' + esc(r.dates) + '</div>' + kpiLine + '</div></div>' +
      '<div class="contribs">' + itemsHtml + '</div>' +
    '</div>';
  }).join('');

  /* ── skill groups ────────────────────────────────────────── */
  var skillGroups = (D.skills && D.skills.order || []).map(function (catName) {
    var cat = D.skills.categories[catName] || { items: [] };
    return {
      name: catName,
      items: (cat.items || []).map(function (it) {
        return {
          name: it.name,
          years: it.years ? it.years + ' yr' : '',
          level: it.level,
          w: 'width:' + (it.level / 4 * 100) + '%'
        };
      })
    };
  });
  var skillGroupsHtml = skillGroups.map(function (g) {
    var itemsHtml = g.items.map(function (sk) {
      return '<div class="sk">' +
        '<span class="nm">' + esc(sk.name) + '</span>' +
        '<div class="track" role="img" aria-label="Proficiency ' + esc(sk.level) + ' of 4"><div class="fillb" style="' + sk.w + '"></div></div>' +
        '<span class="yr">' + esc(sk.years) + '</span>' +
      '</div>';
    }).join('');
    return '<div class="skcat"><h3>' + esc(g.name) + '</h3>' + itemsHtml + '</div>';
  }).join('');

  /* ── education ───────────────────────────────────────────── */
  var education = (D.education || []);
  var eduHtml = education.map(function (e) {
    return '<div class="edu">' +
      '<div class="d">' + esc(e.degree_line) + '</div>' +
      '<div class="i">' + esc(e.institution) + '</div>' +
      '<div class="y">' + esc(e.dates) + '</div>' +
    '</div>';
  }).join('');

  /* ── certifications ──────────────────────────────────────── */
  var certs = (D.certifications || []);
  var certsHtml = certs.map(function (c) {
    return '<div class="edu">' +
      '<div class="d" style="font-size:14.5px">' + esc(c.name) + '</div>' +
      '<div class="i">' + esc(c.issuer) + '</div>' +
    '</div>';
  }).join('');

  /* ── interests ───────────────────────────────────────────── */
  var interests = (D.overview && D.overview.interests || []).join(' \u00B7 ');

  /* ── projects (from template-utils) ──────────────────────── */
  var projectsSec = '';
  var projects = D.projects || [];
  if (projects.length) {
    projectsSec = '<div class="sec">' +
      '<div class="sectitle"><h2>Projects</h2><span class="fill"></span></div>' +
      renderProjectsHtml(projects) +
    '</div>';
  }

  /* ── resume ATS (from template-utils) ────────────────────── */
  var resumeSec = '';
  if (D.resume) {
    resumeSec = '<div class="sec">' +
      '<div class="sectitle"><h2>Resume</h2><span class="fill"></span></div>' +
      renderResumeHtml(D.resume, meta) +
    '</div>';
  }

  /* ── social (from template-utils) ────────────────────────── */
  var socialSec = '';
  var social = D.social || [];
  if (social.length) {
    socialSec = '<div class="sec">' +
      '<div class="sectitle"><h2>Social</h2><span class="fill"></span></div>' +
      '<div class="soc-grid">' + renderSocialHtml(social) + '</div>' +
    '</div>';
  }

  /* ── footer (from template-utils) ────────────────────────── */
  var footerHtml = renderFooterHtml(meta);

  /* ── photo fallback ──────────────────────────────────────── */
  var photoTag = photo
    ? '<img class="photo" src="' + esc(photo) + '" alt="' + esc(name) + '">'
    : '<div class="photo" style="background:var(--paper2);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:56px;font-weight:700;color:var(--orange)">' + esc(name.charAt(0)) + '</div>';

  /* ── assemble full page ──────────────────────────────────── */
  var html =
    '<div class="wr">' +

      /* hero */
      '<div class="hero">' + photoTag + '<div>' +
        '<div class="lbl">Portfolio \u00B7 ' + esc(genDate) + '</div>' +
        '<h1 class="name">' + esc(name) + '</h1>' +
        '<div class="headline">' + esc(headline) + '</div>' +
        '<div class="meta">' +
          '<span>' + esc(location) + '</span>' +
          '<span>' + esc(email) + '</span>' +
          '<span>' + esc(phone) + '</span>' +
          linksHtml +
        '</div>' +
      '</div></div>' +

      /* summary */
      '<p class="summary">' + esc(summary) + '</p>' +

      /* stats */
      (statsHtml ? '<div class="stats">' + statsHtml + '</div>' : '') +

      /* career timeline */
      '<div class="sec"><div class="sectitle"><h2>Career Timeline</h2><span class="fill"></span></div>' +
        '<div class="tl">' + timelineHtml + '</div>' +
      '</div>' +

      /* experience */
      '<div class="sec"><div class="sectitle"><h2>Experience</h2><span class="fill"></span></div>' +
        rolesHtml +
      '</div>' +

      /* projects */
      projectsSec +

      /* skills, education & certifications */
      '<div class="sec"><div class="sectitle"><h2>Skills, Education &amp; Certifications</h2><span class="fill"></span></div>' +
        '<div class="cols">' +
          '<div class="panel">' + skillGroupsHtml + '</div>' +
          '<div>' +
            '<div class="panel" style="margin-bottom:18px">' +
              '<div class="skcat"><h3>Education</h3>' + eduHtml + '</div>' +
            '</div>' +
            '<div class="panel">' +
              '<div class="skcat"><h3>Certifications</h3>' + certsHtml + '</div>' +
              '<div class="skcat" style="margin-top:18px"><h3>Interests</h3>' +
                '<div class="interests">' + esc(interests) + '</div>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>' +

      /* resume ATS */
      resumeSec +

      /* social */
      socialSec +

      /* footer */
      '<div class="foot">' + esc(name) + ' \u2014 set in Spectral &amp; Inter</div>' +
      footerHtml +

    '</div>';

  document.getElementById('root').innerHTML = html;

  /* ── entrance animation ──────────────────────────────────── */
  revealRows('.tlrow');

})();
</script>
<script src="https://cdn.jsdelivr.net/gh/oneconsciousness/job-hunt-with-hope@3b0848f2df8cfd3af177595d30bc26104453fde4/assets/templates/portfolio/switcher.js"></script>
</body>
</html>
