<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Per-page title mirrors demo/index.html naming convention; the engine's
     alternate templates ship without a <title> since they're personless. -->
<title>Susan Kare — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{color-scheme:light dark;--paper:#FBFAF6;--ink:#1A1815;--ink2:#4A453D;--ink3:#746D5C;--line:rgba(26,24,21,.14);--line2:rgba(26,24,21,.07);--accent:#8C2B22;--surface:#fff;--serif:"Newsreader",Georgia,serif;--sans:"IBM Plex Sans",sans-serif;--mono:"IBM Plex Mono",monospace}
[data-theme="dark"]{--paper:#181510;--ink:#F3EEE4;--ink2:#C9C1B3;--ink3:#9C9384;--line:rgba(243,238,228,.16);--line2:rgba(243,238,228,.08);--accent:#E4685C;--surface:#211C15}
*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
.ed{max-width:1000px;margin:0 auto;padding:64px 56px 96px}
.kicker{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent)}
.rule{height:1px;background:var(--ink);margin:18px 0}
.rulethin{height:1px;background:var(--line);margin:0}
.masthead{display:flex;justify-content:space-between;align-items:flex-end;gap:32px;border-bottom:2px solid var(--ink);padding-bottom:14px}
.name{font-family:var(--serif);font-weight:500;font-size:clamp(40px,9vw,76px);line-height:.92;letter-spacing:-.02em;margin:0;overflow-wrap:anywhere}
.headline{font-family:var(--serif);font-style:italic;font-size:22px;color:var(--ink2);max-width:560px;line-height:1.3}
.metaR{font-family:var(--mono);font-size:11.5px;color:var(--ink3);text-align:right;line-height:2}
.metaR a{color:var(--ink2);text-decoration:none}
.lede{font-family:var(--serif);font-size:27px;line-height:1.45;letter-spacing:-.01em;margin:40px 0 8px;max-width:840px}
.lede .drop{float:left;font-size:88px;line-height:.72;padding:8px 12px 0 0;font-weight:600;color:var(--accent)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-top:1px solid var(--ink);border-bottom:1px solid var(--ink);margin:48px 0}
.stat{padding:22px 22px 22px 0;border-right:1px solid var(--line)}
.stat:last-child{border-right:0}
.stat .v{font-family:var(--serif);font-size:38px;font-weight:600;letter-spacing:-.02em;line-height:1}
.stat .l{font-size:12px;color:var(--ink2);margin-top:8px;line-height:1.4}
.secthead{display:flex;align-items:baseline;gap:16px;margin:64px 0 8px}
.secthead h2{font-family:var(--serif);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.14em;margin:0}
.secthead .num{font-family:var(--mono);font-size:11px;color:var(--accent)}
.secthead .fill{flex:1;height:1px;background:var(--ink)}
.tl{margin-top:22px;display:flex;flex-direction:column}
.tlrow{display:grid;grid-template-columns:128px 1fr auto;gap:20px;align-items:baseline;padding:13px 0;border-top:1px solid var(--line2)}
.tlrow:first-child{border-top:0}
.tldate{font-family:var(--mono);font-size:11.5px;color:var(--ink3)}
.tllabel{font-family:var(--serif);font-size:18px}
.tlorg{color:var(--ink2);font-style:italic}
.tlmetric{font-family:var(--mono);font-size:11px;color:var(--accent);text-align:right;white-space:nowrap}
.tldot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--accent);margin-right:9px;vertical-align:middle}
.tldot.edu{background:var(--ink3)}
@keyframes rise{to{opacity:1;transform:none}}
.exp{margin-top:8px}
.role{padding:34px 0;border-top:1px solid var(--line)}
.rolehead{display:flex;justify-content:space-between;align-items:baseline;gap:24px;flex-wrap:wrap}
.roletitle{font-family:var(--serif);font-size:30px;font-weight:500;letter-spacing:-.01em;line-height:1.1;margin:0}
.roleco{color:var(--accent)}
.rolekpi{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;color:var(--ink3);margin-top:6px}
.roledate{font-family:var(--mono);font-size:11.5px;color:var(--ink3);white-space:nowrap}
.live{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent);border-radius:2px;padding:2px 7px;margin-left:10px}
.contribs{margin-top:18px;display:flex;flex-direction:column;gap:20px}
.contrib{display:grid;grid-template-columns:1fr;gap:7px;padding-left:20px;border-left:2px solid var(--line)}
.cdomain{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3)}
.caction{font-size:14.5px;line-height:1.6;color:var(--ink2)}
.cimpact{font-family:var(--serif);font-size:17px;line-height:1.45;color:var(--ink)}
.cmetric{display:inline-block;font-family:var(--serif);font-size:21px;font-weight:600;color:var(--accent);font-style:italic;margin-bottom:2px}
.cmetricsub{font-family:var(--sans);font-style:normal;font-size:12px;font-weight:400;color:var(--ink3);letter-spacing:.01em}
.cskills{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
.chip{font-family:var(--mono);font-size:10.5px;color:var(--ink2);border-bottom:1px solid var(--line);padding-bottom:1px}
.twocol{display:grid;grid-template-columns:1.3fr 1fr;gap:56px;margin-top:22px}
.skillcat{margin-bottom:26px}
.skillcat h3{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink);margin:0 0 12px;font-weight:600}
.skill{display:flex;align-items:center;gap:12px;padding:7px 0;border-top:1px solid var(--line2)}
.skill .nm{flex:1;font-size:14.5px;font-family:var(--serif)}
.skill .yr{font-family:var(--mono);font-size:10.5px;color:var(--ink3);width:54px;text-align:right}
.bars{display:flex;gap:3px;width:64px}
.seg{height:6px;flex:1;background:var(--line);border-radius:1px}
.seg.on{background:var(--accent)}
.edu{padding:14px 0;border-top:1px solid var(--line2)}
.edu:first-child{border-top:0}
.edudeg{font-family:var(--serif);font-size:17px}
.eduinst{color:var(--ink2);font-size:13px;font-style:italic}
.edudate{font-family:var(--mono);font-size:10.5px;color:var(--ink3)}
.foot{margin-top:72px;border-top:2px solid var(--ink);padding-top:18px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--ink3);flex-wrap:wrap;gap:12px}
.interests{font-style:italic;font-family:var(--serif);color:var(--ink2);font-size:14px}

/* ─── Links row ─────────────────────────────────────────────────────────────── */
.links-row{display:flex;flex-wrap:wrap;gap:16px;margin-top:6px}
.links-row a{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11.5px;color:var(--ink2);text-decoration:none;transition:color .15s}
.links-row a:hover{color:var(--accent)}
.links-row svg{width:14px;height:14px;flex-shrink:0}

/* ─── Stats identity row ────────────────────────────────────────────────────── */
.id-stats{display:flex;flex-wrap:wrap;gap:20px;margin:14px 0 0;font-family:var(--mono);font-size:11px;color:var(--ink3)}
.id-stat-val{font-weight:600;color:var(--accent)}

/* ─── Projects section ──────────────────────────────────────────────────────── */
.proj{padding:28px 0;border-top:1px solid var(--line)}
.proj:first-child{border-top:0}
.projhead{display:flex;justify-content:space-between;align-items:baseline;gap:20px;flex-wrap:wrap}
.projname{font-family:var(--serif);font-size:22px;font-weight:500;line-height:1.2}
.projname .live{vertical-align:middle}
.projdate{font-family:var(--mono);font-size:11px;color:var(--ink3);white-space:nowrap}
.projtag{font-family:var(--serif);font-style:italic;font-size:15px;color:var(--ink2);margin-top:6px}
.projmetric{display:inline-block;font-family:var(--mono);font-size:11px;color:var(--accent);border:1px solid var(--accent);border-radius:2px;padding:1px 7px;margin-left:10px;font-style:normal}
.projdesc{font-size:14px;line-height:1.65;color:var(--ink2);margin:8px 0 0}
.projimpact{font-family:var(--serif);font-size:16px;line-height:1.45;color:var(--ink);margin:8px 0 0}
.projlink{margin-top:10px}
.projlink a{font-family:var(--mono);font-size:11.5px;color:var(--accent);text-decoration:none}
.projlink a:hover{text-decoration:underline}

/* ─── Resume ATS section ────────────────────────────────────────────────────── */
.resume-view{background:var(--surface);border:1px solid var(--line);padding:40px 48px;margin-top:22px;font-size:14px;line-height:1.7}
.resume-view h2{font-family:var(--serif);font-size:28px;font-weight:600;margin:0 0 4px;letter-spacing:-.01em}
.resume-headline{font-family:var(--serif);font-style:italic;font-size:16px;color:var(--ink2);margin:0 0 8px}
.resume-contact{font-family:var(--mono);font-size:11px;color:var(--ink3);margin-bottom:18px}
.resume-contact a{color:var(--accent);text-decoration:none}
.resume-view h3{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin:22px 0 8px;font-weight:600;border-bottom:1px solid var(--line);padding-bottom:6px}
.resume-summary{color:var(--ink2);margin:0 0 8px}
.rentry{margin-bottom:14px}
.rentryhead{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:10px}
.rtitle{font-family:var(--serif);font-weight:600;font-size:15px}
.rdates{font-family:var(--mono);font-size:10.5px;color:var(--ink3)}
.rorg{color:var(--ink2);font-style:italic;font-size:13px}
.resume-view ul{margin:6px 0 0;padding-left:20px}
.resume-view li{margin-bottom:4px;color:var(--ink2);font-size:13.5px;line-height:1.55}
.resume-view li strong{color:var(--accent);font-weight:600;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em}
.resume-skills{color:var(--ink2);margin:0}

/* ─── Social section ────────────────────────────────────────────────────────── */
.soc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;margin-top:22px}
.soc-card{background:var(--surface);border:1px solid var(--line);padding:22px 24px;transition:border-color .15s}
.soc-card:hover{border-color:var(--accent)}
.soc-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.soc-head svg{width:18px;height:18px;color:var(--ink3);flex-shrink:0}
.soc-platform{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3)}
.soc-pinned{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent);border-radius:2px;padding:1px 6px;margin-left:auto}
.soc-caption{font-family:var(--serif);font-size:14.5px;line-height:1.55;color:var(--ink2);margin-bottom:10px}
.soc-link{font-family:var(--mono);font-size:11px;color:var(--accent);text-decoration:none}
.soc-link:hover{text-decoration:underline}

/* ─── Footer generation line ────────────────────────────────────────────────── */
.foot-gen{font-family:var(--mono);font-size:10.5px;color:var(--ink3);margin-top:6px}
.foot-gen a{color:var(--accent);text-decoration:none}
.foot-gen a:hover{text-decoration:underline}

@media(max-width:760px){.ed{padding:36px 22px}.name{font-size:clamp(34px,11vw,48px)}.stats{grid-template-columns:repeat(2,1fr)}.twocol{grid-template-columns:1fr;gap:0}.tlrow{grid-template-columns:1fr;gap:4px}.tlmetric{text-align:left}.masthead{flex-direction:column;align-items:flex-start}.metaR{text-align:left}.resume-view{padding:24px 20px}.soc-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="app"></div>
<script src="data.js"></script>
<script src="https://cdn.jsdelivr.net/gh/oneconsciousness/job-hunt-with-hope@3b0848f2df8cfd3af177595d30bc26104453fde4/assets/templates/portfolio/template-utils.js"></script>
<script>
(function () {
  var D = window.HOPE_DATA;
  if (!D) return;

  var id   = D.identity || {};
  var meta = D.meta || {};
  var link0 = (id.links && id.links[0]) || {};
  var summary = id.summary || '';
  var genDate = meta.generation_date || '';

  /* ── Timeline ───────────────────────────────────────────────────────── */
  var timeline = (D.timeline || []).map(function (t) {
    return {
      period: fmtPeriod(t.date_start, t.date_end),
      label:  String(t.label||'').split(' @ ')[0],
      org:    t.org,
      metric: t.metric || '',
      dotCls: (t.type === 'education' || t.type === 'certification') ? 'tldot edu' : 'tldot'
    };
  });

  /* ── Experience (flattened) ─────────────────────────────────────────── */
  var roles = flattenContribs(D.experience);

  /* ── Skills ─────────────────────────────────────────────────────────── */
  var skillGroups = (D.skills && D.skills.order || []).map(function (name) {
    var cat = D.skills.categories[name] || { items: [] };
    return {
      name: name,
      items: (cat.items || []).map(function (it) {
        return {
          name:  it.name,
          years: it.years ? it.years + ' yr' : '',
          level: it.level || 0,
          bars:  bars(it.level, 'seg on', 'seg')
        };
      })
    };
  });

  /* ── Education & certs ──────────────────────────────────────────────── */
  var education = (D.education || []).map(function (e) {
    return { degree_line: e.degree_line, institution: e.institution, dates: e.dates };
  });
  var certs = (D.certifications || []).map(function (c) {
    return { name: c.name, issuer: c.issuer };
  });
  var interests = (D.overview && D.overview.interests || []).join(' \u00B7 ');

  /* ── Stats ──────────────────────────────────────────────────────────── */
  var headlineStats = (D.overview && D.overview.headline_stats || []);
  var identityStats = id.stats || [];

  /* ── Name / headline ────────────────────────────────────────────────── */
  var personName = meta.name || id.name;
  var personHeadline = meta.headline || '';

  /* ═══════════════════════════════════════════════════════════════════════
     BUILD HTML
     ═══════════════════════════════════════════════════════════════════════ */
  var html = '';

  /* ── Masthead ───────────────────────────────────────────────────────── */
  html += '<div class="ed">';
  html += '<div class="masthead"><div>';
  html += '<div class="kicker">Portfolio \u00B7 ' + esc(genDate) + '</div>';
  html += '<h1 class="name">' + esc(personName) + '</h1>';
  html += '</div>';
  html += '<div class="metaR">' + esc(id.location || '') + '<br>' + esc(id.email || '') + '<br>' + esc(id.phone || '');
  html += '<br><a href="' + esc(link0.url || '#') + '">' + esc(link0.label || 'LinkedIn') + '</a>';
  html += '</div></div>';

  /* ── All links row ──────────────────────────────────────────────────── */
  if (id.links && id.links.length) {
    html += '<div class="links-row">' + renderLinksHtml(id.links) + '</div>';
  }

  /* ── Headline ───────────────────────────────────────────────────────── */
  html += '<p class="headline">' + esc(personHeadline) + '</p>';

  /* ── Lede (drop-cap) ────────────────────────────────────────────────── */
  html += '<p class="lede"><span class="drop">' + esc(summary.charAt(0)) + '</span>' + esc(summary.slice(1)) + '</p>';

  /* ── Identity stats ─────────────────────────────────────────────────── */
  if (identityStats.length) {
    html += '<div class="id-stats">';
    html += identityStats.map(function (s) {
      return '<span><span class="id-stat-val">' + esc(s.value) + '</span> ' + esc(s.label) + '</span>';
    }).join('');
    html += '</div>';
  }

  /* ── Headline stats ─────────────────────────────────────────────────── */
  html += '<div class="stats">';
  html += headlineStats.map(function (s) {
    return '<div class="stat"><div class="v">' + esc(s.value) + '</div><div class="l">' + esc(s.label) + '</div></div>';
  }).join('');
  html += '</div>';

  /* ── 01 Career Timeline ─────────────────────────────────────────────── */
  html += '<div class="secthead"><span class="num">01</span><h2>Career Timeline</h2><span class="fill"></span></div>';
  html += '<div class="tl">';
  html += timeline.map(function (t) {
    return '<div class="tlrow">' +
      '<div class="tldate">' + esc(t.period) + '</div>' +
      '<div class="tllabel"><span class="' + esc(t.dotCls) + '"></span>' + esc(t.label) + ' <span class="tlorg">' + esc(t.org) + '</span></div>' +
      '<div class="tlmetric">' + esc(t.metric) + '</div>' +
    '</div>';
  }).join('');
  html += '</div>';

  /* ── 02 Experience ──────────────────────────────────────────────────── */
  html += '<div class="secthead"><span class="num">02</span><h2>Experience</h2><span class="fill"></span></div>';
  html += '<div class="exp">';
  html += roles.map(function (r) {
    var currentBadge = r.is_current ? '<span class="live">Current</span>' : '';
    var contribsHtml = r.items.map(function (c) {
      var metricHtml = '';
      if (c.metric) {
        var arrow = metricArrow(c.metricDir);
        var subj = c.metricSubject ? ' <span class="cmetricsub">' + esc(c.metricSubject) + '</span>' : '';
        metricHtml = '<div class="cmetric">' + (arrow ? arrow + ' ' : '') + esc(c.metric) + subj + '</div>';
      }
      var chipsHtml = c.skills.map(function (sk) {
        return '<span class="chip">' + esc(sk) + '</span>';
      }).join('');
      return '<div class="contrib">' +
        '<div class="cdomain">' + esc(c.domain) + '</div>' +
        metricHtml +
        '<div class="cimpact">' + esc(c.impact) + '</div>' +
        '<div class="caction">' + esc(c.action) + '</div>' +
        '<div class="cskills">' + chipsHtml + '</div>' +
      '</div>';
    }).join('');
    var kpiHtml = '';
    if (r.kpis) {
      var kpiParts = [];
      if (r.kpis.ic)     kpiParts.push(esc(r.kpis.ic) + ' IC');
      if (r.kpis.lead)   kpiParts.push(esc(r.kpis.lead) + ' Lead');
      if (r.kpis.metric) kpiParts.push(esc(r.kpis.metric) + ' metric' + (r.kpis.metric === 1 ? '' : 's'));
      if (kpiParts.length) kpiHtml = '<div class="rolekpi">' + kpiParts.join(' \u00B7 ') + '</div>';
    }
    return '<div class="role">' +
      '<div class="rolehead">' +
        '<h3 class="roletitle">' + esc(r.role_title) + '<span class="roleco"> \u00B7 ' + esc(r.company) + '</span>' + currentBadge + '</h3>' +
        '<div class="roledate">' + esc(r.dates) + '</div>' +
      '</div>' +
      kpiHtml +
      '<div class="contribs">' + contribsHtml + '</div>' +
    '</div>';
  }).join('');
  html += '</div>';

  /* ── 03 Skills & Education ──────────────────────────────────────────── */
  html += '<div class="secthead"><span class="num">03</span><h2>Skills &amp; Education</h2><span class="fill"></span></div>';
  html += '<div class="twocol"><div>';

  /* Skills columns */
  html += skillGroups.map(function (g) {
    var itemsHtml = g.items.map(function (sk) {
      var barsHtml = sk.bars.map(function (b) {
        return '<span class="' + esc(b.cls) + '"></span>';
      }).join('');
      return '<div class="skill">' +
        '<span class="nm">' + esc(sk.name) + '</span>' +
        '<div class="bars" role="img" aria-label="' + esc(sk.level) + ' of 4">' + barsHtml + '</div>' +
        '<span class="yr">' + esc(sk.years) + '</span>' +
      '</div>';
    }).join('');
    return '<div class="skillcat"><h3>' + esc(g.name) + '</h3>' + itemsHtml + '</div>';
  }).join('');

  /* Right column: education, certs, interests */
  html += '</div><div>';

  html += '<div class="skillcat"><h3>Education</h3>';
  html += education.map(function (e) {
    return '<div class="edu">' +
      '<div class="edudeg">' + esc(e.degree_line) + '</div>' +
      '<div class="eduinst">' + esc(e.institution) + '</div>' +
      '<div class="edudate">' + esc(e.dates) + '</div>' +
    '</div>';
  }).join('');
  html += '</div>';

  html += '<div class="skillcat"><h3>Certifications</h3>';
  html += certs.map(function (c) {
    return '<div class="edu">' +
      '<div class="edudeg" style="font-size:15px">' + esc(c.name) + '</div>' +
      '<div class="eduinst">' + esc(c.issuer) + '</div>' +
    '</div>';
  }).join('');
  html += '</div>';

  html += '<div class="skillcat"><h3>Interests</h3>';
  html += '<div class="interests">' + esc(interests) + '</div>';
  html += '</div>';

  html += '</div></div>';

  /* ── 04 Projects ────────────────────────────────────────────────────── */
  if (D.projects && D.projects.length) {
    html += '<div class="secthead"><span class="num">04</span><h2>Projects</h2><span class="fill"></span></div>';
    html += '<div class="exp">';
    html += renderProjectsHtml(D.projects, {
      card: 'proj', head: 'projhead', name: 'projname', dates: 'projdate',
      tag: 'projtag', desc: 'projdesc', impact: 'projimpact',
      skills: 'cskills', link: 'projlink', metric: 'projmetric', pill: 'live'
    });
    html += '</div>';
  }

  /* ── 05 Social ──────────────────────────────────────────────────────── */
  if (D.social && D.social.length) {
    html += '<div class="secthead"><span class="num">05</span><h2>Social</h2><span class="fill"></span></div>';
    html += '<div class="soc-grid">';
    html += renderSocialHtml(D.social);
    html += '</div>';
  }

  /* ── Resume ATS ─────────────────────────────────────────────────────── */
  if (D.resume) {
    html += '<div class="secthead"><span class="num">06</span><h2>R\u00E9sum\u00E9 (ATS)</h2><span class="fill"></span></div>';
    html += renderResumeHtml(D.resume, meta);
  }

  /* ── Footer ─────────────────────────────────────────────────────────── */
  html += '<div class="foot">';
  html += '<span>' + esc(personName) + ' \u2014 ' + esc(personHeadline) + '</span>';
  html += '<span>Set in Newsreader &amp; IBM Plex</span>';
  html += '</div>';
  html += renderFooterHtml(meta);

  html += '</div>'; /* close .ed */

  /* ── MOUNT ──────────────────────────────────────────────────────────── */
  document.getElementById('app').innerHTML = html;
  revealRows('.tlrow');
})();
</script>
