<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Per-page title mirrors demo/index.html naming convention; the engine's
     alternate templates ship without a <title> since they're personless. -->
<title>Andrej Karpathy — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Archivo+Narrow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{color-scheme:light dark;--bg:#FCFCFC;--ink:#0E0E0E;--ink2:#5A5A5A;--ink3:#737373;--line:#E2E2E2;--line2:#EFEFEF;--red:#E2231A;--sans:"Archivo",Helvetica,Arial,sans-serif;--narrow:"Archivo Narrow",sans-serif}
[data-theme="dark"]{color-scheme:dark;--bg:#121212;--ink:#F3F3F1;--ink2:#9C9C9A;--ink3:#7E7E7C;--line:#2E2E2E;--line2:#242424;--red:#FF4438}
/* dark: white pill text on bright --red is only 3.42:1 — deepen the badge background so #fff reaches AA (keeps --red bright for accent text) */
[data-theme="dark"] .live,[data-theme="dark"] .soc-pinned{background:#C21F16}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
.sw{max-width:1100px;margin:0 auto;padding:56px 48px 100px}
.hl{height:3px;background:var(--ink)}
.lbl{font-family:var(--narrow);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink3)}
.lblr{color:var(--red)}
.top{display:grid;grid-template-columns:1fr 280px;gap:48px;padding-top:18px}
.name{font-size:clamp(40px,9vw,64px);font-weight:800;letter-spacing:-.03em;line-height:.95;margin:14px 0 0;overflow-wrap:anywhere}
.headline{font-size:19px;font-weight:500;color:var(--ink2);max-width:560px;margin:18px 0 0;line-height:1.35}
.contact{font-family:var(--narrow);font-size:13px;line-height:1.9;color:var(--ink2)}
.contact a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--red)}
.contact .k{color:var(--ink3);display:inline-block;width:64px}
.contact .links{display:flex;flex-direction:column;gap:2px;margin-top:4px}
.contact .links a{display:inline-flex;align-items:center;gap:5px}
.contact .links svg{width:14px;height:14px;flex-shrink:0}
.summary{font-size:21px;font-weight:500;line-height:1.5;letter-spacing:-.01em;max-width:760px;margin:44px 0 0}
.summary b{color:var(--red);font-weight:600}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);border-top:3px solid var(--ink);border-bottom:1px solid var(--line);margin:48px 0}
.kpi{padding:20px 18px 24px 0}
.kpi .n{font-size:44px;font-weight:800;letter-spacing:-.03em;line-height:1}
.kpi .n em{color:var(--red);font-style:normal}
.kpi .c{font-size:12px;color:var(--ink2);margin-top:10px;line-height:1.4;max-width:170px}
.sec{margin-top:72px}
.sechd{display:grid;grid-template-columns:280px 1fr;gap:48px;align-items:baseline;border-top:3px solid var(--ink);padding-top:12px}
.sechd .t{font-size:24px;font-weight:700;letter-spacing:-.02em;margin:0}
.tl{margin-top:8px}
.tlrow{display:grid;grid-template-columns:280px 1fr auto;gap:48px;align-items:baseline;padding:14px 0;border-bottom:1px solid var(--line2)}
.tldate{font-family:var(--narrow);font-size:13px;color:var(--ink3)}
.tllabel{font-size:16px;font-weight:600}
.tlorg{color:var(--ink2);font-weight:400}
.tlmetric{font-family:var(--narrow);font-size:13px;color:var(--red);text-align:right;white-space:nowrap}
@keyframes rise{to{opacity:1;transform:none}}
.role{display:grid;grid-template-columns:280px 1fr;gap:48px;padding:30px 0;border-bottom:1px solid var(--line)}
.rolemeta .rt{font-size:20px;font-weight:700;letter-spacing:-.01em;line-height:1.15}
.rolemeta .rc{color:var(--red);font-weight:600;margin-top:3px}
.rolemeta .rd{font-family:var(--narrow);font-size:13px;color:var(--ink3);margin-top:6px}
.rolemeta .rk{font-family:var(--narrow);font-size:11px;letter-spacing:.08em;color:var(--ink3);margin-top:8px}
.rolemeta .live{display:inline-block;font-family:var(--narrow);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#fff;background:var(--red);padding:2px 7px;margin-top:10px}
.contribs{display:flex;flex-direction:column;gap:22px}
.contrib{display:grid;gap:6px}
.cd{font-family:var(--narrow);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3)}
.cm{font-size:26px;font-weight:800;letter-spacing:-.02em;color:var(--red);line-height:1}
.csub{font-family:var(--narrow);font-size:11px;letter-spacing:.06em;color:var(--ink3);margin-top:-2px}
.ci{font-size:15px;font-weight:500;line-height:1.5}
.ca{font-size:13.5px;color:var(--ink2);line-height:1.6}
.cs{display:flex;flex-wrap:wrap;gap:6px;margin-top:3px}
.chip{font-family:var(--narrow);font-size:11px;color:var(--ink2);background:var(--line2);padding:2px 8px}
.skgrid{display:grid;grid-template-columns:280px 1fr;gap:48px;margin-top:8px}
.skcols{display:grid;grid-template-columns:1fr 1fr;gap:40px}
.skcat{margin-bottom:24px}
.skcat h3{font-family:var(--narrow);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink);margin:0 0 10px;padding-bottom:6px;border-bottom:2px solid var(--ink)}
.sk{display:grid;grid-template-columns:1fr 70px 40px;gap:12px;align-items:center;padding:6px 0}
.sk .nm{font-size:13.5px;font-weight:500}
.sk .yr{font-family:var(--narrow);font-size:11px;color:var(--ink3);text-align:right}
.track{height:8px;background:var(--line);position:relative}
.fillb{height:100%;background:var(--ink)}
.fillb.l4{background:var(--red)}
.edu{padding:12px 0;border-bottom:1px solid var(--line2)}
.edu .d{font-size:15px;font-weight:600}
.edu .i{color:var(--ink2);font-size:13px}
.edu .y{font-family:var(--narrow);font-size:11px;color:var(--ink3);margin-top:2px}
.interests{font-size:13px;color:var(--ink2);line-height:1.7}

/* ── Projects ──────────────────────────────────────────────────────────────── */
.projgrid{display:grid;grid-template-columns:280px 1fr;gap:48px;margin-top:8px}
.projcards{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.proj{border:1px solid var(--line);padding:22px 24px 20px;display:flex;flex-direction:column;gap:8px}
.projhead{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
.projname{font-size:15px;font-weight:700;letter-spacing:-.01em}
.projdate{font-family:var(--narrow);font-size:11px;color:var(--ink3)}
.projtag{font-size:13px;color:var(--ink2);line-height:1.45}
.projmetric{display:inline-block;font-family:var(--narrow);font-size:11px;color:var(--red);font-weight:600;margin-left:6px}
.projdesc{font-size:13px;color:var(--ink2);line-height:1.55;margin:0}
.projimpact{font-size:13px;font-weight:500;line-height:1.5;margin:0}
.projlink{margin-top:auto;padding-top:4px}
.projlink a{font-family:var(--narrow);font-size:12px;color:var(--red);text-decoration:none;border-bottom:1px solid var(--red)}
.cskills{display:flex;flex-wrap:wrap;gap:6px}

/* ── Resume ATS ────────────────────────────────────────────────────────────── */
.resume-wrap{display:grid;grid-template-columns:280px 1fr;gap:48px;margin-top:8px}
.resume-view{font-size:13.5px;line-height:1.6}
.resume-view h2{font-size:22px;font-weight:800;letter-spacing:-.02em;margin:0 0 4px}
.resume-headline{color:var(--ink2);margin:0 0 10px}
.resume-contact{font-family:var(--narrow);font-size:12px;color:var(--ink3);margin-bottom:18px}
.resume-contact a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--red)}
.resume-view h3{font-family:var(--narrow);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);margin:24px 0 10px;padding-bottom:6px;border-bottom:2px solid var(--ink)}
.resume-summary{color:var(--ink2);margin:0 0 8px}
.rentry{margin-bottom:16px}
.rentryhead{display:flex;justify-content:space-between;align-items:baseline}
.rtitle{font-weight:600}
.rdates{font-family:var(--narrow);font-size:12px;color:var(--ink3)}
.rorg{color:var(--red);font-weight:600;font-size:13px}
.rentry ul{margin:6px 0 0;padding-left:18px;color:var(--ink2)}
.rentry li{margin-bottom:4px}
.rentry li strong{color:var(--ink);font-weight:600}
.resume-skills{color:var(--ink2);margin:0}

/* ── Social ────────────────────────────────────────────────────────────────── */
.socgrid{display:grid;grid-template-columns:280px 1fr;gap:48px;margin-top:8px}
.soccards{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.soc-card{border:1px solid var(--line);padding:18px 20px 16px;display:flex;flex-direction:column;gap:10px}
.soc-head{display:flex;align-items:center;gap:8px}
.soc-head svg{width:18px;height:18px;color:var(--ink3)}
.soc-platform{font-family:var(--narrow);font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink2)}
.soc-pinned{font-family:var(--narrow);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#fff;background:var(--red);padding:2px 7px;margin-left:auto}
.soc-caption{font-size:13px;color:var(--ink2);line-height:1.5}
.soc-link{font-family:var(--narrow);font-size:12px;color:var(--red);text-decoration:none;border-bottom:1px solid var(--red);align-self:flex-start}

/* ── Footer ────────────────────────────────────────────────────────────────── */
.foot{margin-top:80px;border-top:3px solid var(--ink);padding-top:14px;display:flex;justify-content:space-between;font-family:var(--narrow);font-size:12px;color:var(--ink3);flex-wrap:wrap;gap:10px}
.foot a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--red)}
.foot-gen{font-family:var(--narrow);font-size:12px;color:var(--ink3)}
.foot-gen a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--red)}

/* ── Responsive ────────────────────────────────────────────────────────────── */
@media(max-width:820px){.sw{padding:32px 20px}.top,.sechd,.tlrow,.role,.skgrid,.projgrid,.resume-wrap,.socgrid{grid-template-columns:1fr;gap:16px}.name{font-size:44px}.grid4{grid-template-columns:1fr 1fr}.skcols{grid-template-columns:1fr}.projcards,.soccards{grid-template-columns:1fr}.tlrow{grid-template-columns:1fr auto}.tldate{grid-column:1/-1}}
</style>
</head>
<body>
<div id="root"></div>
<script src="data.js"></script>
<script src="https://cdn.jsdelivr.net/gh/oneconsciousness/job-hunt-with-hope@3b0848f2df8cfd3af177595d30bc26104453fde4/assets/templates/portfolio/template-utils.js"></script>
<script>
(function () {
  var D = window.HOPE_DATA;
  if (!D) { document.getElementById('root').textContent = 'No data found.'; return; }

  var id = D.identity || {};
  var meta = D.meta || {};
  var links = id.links || [];

  /* ── helpers ──────────────────────────────────────────────────────────── */
  function emphasize(str) {
    return (str || '').replace(
      /(\$[\d.,]+[KMB]?\+?(?:\/(?:yr|site|year))?|\d+%|\d[\d,]*\+?(?: (?:years|references|standards))?)/g,
      '<b>$1</b>'
    );
  }
  function bigEm(v) {
    return (v || '').replace(/(\$|%|\+|\/yr|\/site|M|K)/g, '<em>$1</em>');
  }

  /* ── data extraction ─────────────────────────────────────────────────── */
  var name     = meta.name || id.name || '';
  var headline = meta.headline || '';
  var location = id.location || '';
  var email    = id.email || '';
  var phone    = id.phone || '';
  var genDate  = meta.generation_date || '';
  var summary  = id.summary || '';

  var stats = (D.overview && D.overview.headline_stats || []).map(function (s) {
    return { value: s.value, label: s.label };
  });

  var timeline = (D.timeline || []).map(function (t) {
    return {
      period: fmtPeriod(t.date_start, t.date_end),
      label: String(t.label||'').split(' @ ')[0],
      org: t.org,
      metric: t.metric || ''
    };
  });

  var roles = flattenContribs(D.experience);

  var allGroups = (D.skills && D.skills.order || []).map(function (catName) {
    var cat = D.skills.categories[catName] || { items: [] };
    return {
      name: catName,
      items: (cat.items || []).map(function (it) {
        return {
          name: it.name,
          years: it.years ? it.years + 'y' : '',
          level: it.level,
          w: 'width:' + (it.level / 4 * 100) + '%',
          fillCls: it.level >= 4 ? 'fillb l4' : 'fillb'
        };
      })
    };
  });
  var half = Math.ceil(allGroups.length / 2);
  var skillGroupsA = allGroups.slice(0, half);
  var skillGroupsB = allGroups.slice(half);

  var education = (D.education || []).map(function (e) {
    return { degree_line: e.degree_line, institution: e.institution, dates: e.dates };
  });
  var certs = (D.certifications || []).map(function (c) {
    return { name: c.name, issuer: c.issuer };
  });

  var interests = (D.overview && D.overview.interests || []).join(' · ');

  /* ── contact links ───────────────────────────────────────────────────── */
  var linksHtml = links.map(function (lnk) {
    if (!lnk || !lnk.url) return '';
    return '<span class="k"></span><a href="' + esc(lnk.url) + '" target="_blank" rel="noopener">' + esc(lnk.label) + '</a><br>';
  }).join('');

  /* ── stats KPIs ──────────────────────────────────────────────────────── */
  var statsHtml = stats.map(function (s) {
    return '<div class="kpi"><div class="n">' + bigEm(s.value) + '</div><div class="c">' + esc(s.label) + '</div></div>';
  }).join('');

  /* ── timeline rows ───────────────────────────────────────────────────── */
  var timelineHtml = timeline.map(function (t) {
    return '<div class="tlrow">' +
      '<div class="tldate">' + esc(t.period) + '</div>' +
      '<div class="tllabel">' + esc(t.label) + ' <span class="tlorg">\u2014 ' + esc(t.org) + '</span></div>' +
      '<div class="tlmetric">' + esc(t.metric) + '</div>' +
    '</div>';
  }).join('');

  /* ── experience roles ────────────────────────────────────────────────── */
  var rolesHtml = roles.map(function (r) {
    var itemsHtml = r.items.map(function (c) {
      var arrow = metricArrow(c.metricDir);
      var metricBlock = c.metric
        ? '<div class="cm">' + (arrow ? esc(arrow) + ' ' : '') + esc(c.metric) + '</div>' +
          (c.metricSubject ? '<div class="csub">' + esc(c.metricSubject) + '</div>' : '')
        : '';
      var chipsHtml = c.skills.map(function (sk) {
        return '<span class="chip">' + esc(sk) + '</span>';
      }).join('');
      return '<div class="contrib">' +
        '<div class="cd">' + esc(c.domain) + '</div>' +
        metricBlock +
        '<div class="ci">' + esc(c.impact) + '</div>' +
        '<div class="ca">' + esc(c.action) + '</div>' +
        '<div class="cs">' + chipsHtml + '</div>' +
      '</div>';
    }).join('');

    var currentBadge = r.is_current ? '<span class="live">Current</span>' : '';

    var k = r.kpis || {};
    var kParts = [];
    if (k.ic)     kParts.push(k.ic + ' IC');
    if (k.lead)   kParts.push(k.lead + ' lead');
    if (k.metric) kParts.push(k.metric + (k.metric === 1 ? ' metric' : ' metrics'));
    var kpiLine = kParts.length ? '<div class="rk">' + esc(kParts.join(' · ')) + '</div>' : '';

    return '<div class="role">' +
      '<div class="rolemeta">' +
        '<div class="rt">' + esc(r.role_title) + '</div>' +
        '<div class="rc">' + esc(r.company) + '</div>' +
        '<div class="rd">' + esc(r.dates) + '</div>' +
        kpiLine +
        currentBadge +
      '</div>' +
      '<div class="contribs">' + itemsHtml + '</div>' +
    '</div>';
  }).join('');

  /* ── skills columns ──────────────────────────────────────────────────── */
  function renderSkillGroup(g) {
    var itemsHtml = g.items.map(function (sk) {
      return '<div class="sk">' +
        '<span class="nm">' + esc(sk.name) + '</span>' +
        '<div class="track" role="img" aria-label="Proficiency ' + esc(sk.level) + ' of 4"><div class="' + sk.fillCls + '" style="' + sk.w + '"></div></div>' +
        '<span class="yr">' + esc(sk.years) + '</span>' +
      '</div>';
    }).join('');
    return '<div class="skcat"><h3>' + esc(g.name) + '</h3>' + itemsHtml + '</div>';
  }

  var colAHtml = skillGroupsA.map(renderSkillGroup).join('');

  var colBHtml = skillGroupsB.map(renderSkillGroup).join('');

  var eduHtml = education.map(function (e) {
    return '<div class="edu">' +
      '<div class="d">' + esc(e.degree_line) + '</div>' +
      '<div class="i">' + esc(e.institution) + '</div>' +
      '<div class="y">' + esc(e.dates) + '</div>' +
    '</div>';
  }).join('');

  var certsHtml = certs.map(function (c) {
    return '<div class="edu">' +
      '<div class="d" style="font-size:13.5px">' + esc(c.name) + '</div>' +
      '<div class="i">' + esc(c.issuer) + '</div>' +
    '</div>';
  }).join('');

  /* ── projects ────────────────────────────────────────────────────────── */
  var projectsContent = renderProjectsHtml(D.projects || [], {
    card: 'proj', head: 'projhead', name: 'projname', dates: 'projdate',
    tag: 'projtag', desc: 'projdesc', impact: 'projimpact',
    skills: 'cskills', link: 'projlink', metric: 'projmetric', pill: 'live'
  });

  /* ── resume ATS ──────────────────────────────────────────────────────── */
  var resumeContent = renderResumeHtml(D.resume || null, meta);

  /* ── social ──────────────────────────────────────────────────────────── */
  var socialContent = renderSocialHtml(D.social || []);

  /* ── footer ──────────────────────────────────────────────────────────── */
  var footerGenHtml = renderFooterHtml(meta);

  /* ── dynamic section numbering (sections 01-03 are fixed above) ────── */
  var sn = 3;

  sn++;
  var projectsSec = projectsContent ? '<div class="sec">' +
    '<div class="sechd"><div class="lbl">Section 0' + sn + '</div><h2 class="t">Projects</h2></div>' +
    '<div class="projgrid"><div></div><div class="projcards">' + projectsContent + '</div></div>' +
  '</div>' : '';
  if (projectsContent) sn++;

  var resumeSec = resumeContent ? '<div class="sec">' +
    '<div class="sechd"><div class="lbl">Section 0' + sn + '</div><h2 class="t">Resume (ATS)</h2></div>' +
    '<div class="resume-wrap"><div></div><div>' + resumeContent + '</div></div>' +
  '</div>' : '';
  if (resumeContent) sn++;

  var socialSec = socialContent ? '<div class="sec">' +
    '<div class="sechd"><div class="lbl">Section 0' + sn + '</div><h2 class="t">Social</h2></div>' +
    '<div class="socgrid"><div></div><div class="soccards">' + socialContent + '</div></div>' +
  '</div>' : '';

  /* ── assemble ────────────────────────────────────────────────────────── */
  var html = '<div class="sw">' +
    '<div class="hl"></div>' +

    /* ── header / top ── */
    '<div class="top">' +
      '<div>' +
        '<div class="lbl"><span class="lblr">\u25CF</span> Portfolio \u2014 ' + esc(genDate) + '</div>' +
        '<h1 class="name">' + esc(name) + '</h1>' +
        '<p class="headline">' + esc(headline) + '</p>' +
      '</div>' +
      '<div>' +
        '<div class="lbl" style="margin-bottom:10px">Contact</div>' +
        '<div class="contact">' +
          '<span class="k">Location</span>' + esc(location) + '<br>' +
          '<span class="k">Email</span>' + esc(email) + '<br>' +
          '<span class="k">Phone</span>' + esc(phone) + '<br>' +
          linksHtml +
        '</div>' +
      '</div>' +
    '</div>' +

    /* ── summary (uses emphasize — produces HTML, NOT escaped) ── */
    '<p class="summary">' + emphasize(summary) + '</p>' +

    /* ── stats KPIs ── */
    '<div class="grid4">' + statsHtml + '</div>' +

    /* ── Section 01: Career Timeline ── */
    '<div class="sec">' +
      '<div class="sechd"><div class="lbl">Section 01</div><h2 class="t">Career Timeline</h2></div>' +
      '<div class="tl">' + timelineHtml + '</div>' +
    '</div>' +

    /* ── Section 02: Experience ── */
    '<div class="sec">' +
      '<div class="sechd"><div class="lbl">Section 02</div><h2 class="t">Experience</h2></div>' +
      '<div>' + rolesHtml + '</div>' +
    '</div>' +

    /* ── Section 03: Skills, Education & Certifications ── */
    '<div class="sec">' +
      '<div class="sechd"><div class="lbl">Section 03</div><h2 class="t">Skills, Education &amp; Certifications</h2></div>' +
      '<div class="skgrid">' +
        '<div><div class="lbl" style="margin-bottom:8px">Capabilities</div></div>' +
        '<div><div class="skcols">' +
          '<div>' + colAHtml + '</div>' +
          '<div>' + colBHtml +
            '<div class="skcat"><h3>Education</h3>' + eduHtml + '</div>' +
            '<div class="skcat"><h3>Certifications</h3>' + certsHtml + '</div>' +
            (interests ? '<div class="skcat"><h3>Interests</h3><div class="interests">' + esc(interests) + '</div></div>' : '') +
          '</div>' +
        '</div></div>' +
      '</div>' +
    '</div>' +

    /* ── Section 04+: Projects ── */
    projectsSec +

    /* ── Section 05+: Resume ATS ── */
    resumeSec +

    /* ── Section 06+: Social ── */
    socialSec +

    /* ── Footer ── */
    '<div class="foot">' +
      '<span>' + esc(name) + ' \u00B7 ' + esc(headline) + '</span>' +
