# ─────────────────────────────────────────────────────────────────────────────
# Hope user-facing changelog — rendered on /skills/. NEWEST FIRST.
#
# THE RULE (CLAUDE.md §14 / CONTRIBUTING.md): every shipped skill change — every
# current skill, every roadmap skill published from here on — adds an entry here.
# Shipping a skill without a changelog entry is incomplete. This is inevitable.
#
# VOICE (non-negotiable): write for a non-technical job seeker, benefit-first.
#   - headline  = the ONE thing they GAIN, in plain words. This is the skim target.
#   - body      = one or two plain sentences on what it means for them. No jargon
#                 ("graph", "node", "schema", "skill-gap.json"), no version numbers,
#                 no internal mechanics. What matters to THEM is what matters.
#   - date      = display string, e.g. "Jun 2026".
# Good:  "Hope now learns your goal and your timeline."
# Bad:   "Added a Goal node to the career graph schema (v1.1)."
# ─────────────────────────────────────────────────────────────────────────────

- date: "Jul 2026"
  headline: "Your portfolio now reads like a great résumé."
  body: "Every bullet point has been slimmed down to what a recruiter actually reads — the sentence, the result in a soft highlight, and the skills used. And when you save your résumé as a PDF, you now choose how much goes in: just the highlights, the top five per role, or every single bullet."

- date: "Jul 2026"
  headline: "Hope fills out applications with you watching."
  body: "Every field is shown before it's filled, and nothing is ever sent without you saying yes — a plain \"Should I submit?\" every single time. Your logins stay yours; Hope never sees a password. One application at a time, done well — never a spray."

- date: "Jul 2026"
  headline: "Hope now finds roles worth pursuing — and only you decide what makes the board."
  body: "It scouts job boards and company career pages directly, grades every find honestly against your real evidence, and builds a short, ranked shortlist instead of a firehose. Nothing gets targeted without your yes, and your board now lives right on your dashboard."

- date: "Jul 2026"
  headline: "A promise, in writing: Hope never invents a fact about you."
  body: "Every line Hope writes — a win on your page, a read on your gap, a step in your plan — traces back to your own work and your own words. If Hope can't source a claim, it doesn't make it. That rule is now written into every skill."

- date: "Jul 2026"
  headline: "Found a posting? Get an honest fit check before you apply."
  body: "Paste one real job posting and Hope gives you a straight read — how strong your case is, the reasons why, and the two or three things to sharpen before you hit apply. And if you disagree with the read, push back: it listens."

- date: "Jul 2026"
  headline: "Warm introductions come first."
  body: "Before Hope ever suggests applying cold, it asks who you already know. A friendly path into a company beats a stack of cold applications — so your plan now leads with the people, not the portals."

- date: "Jul 2026"
  headline: "Your LinkedIn, brought up to your portfolio's story."
  body: "Once your page is live, Hope offers a short personal checklist to bring your LinkedIn up to the same story — your headline, your wins, and where your new link belongs. You make the edits yourself, in your own account; Hope never touches it for you."

- date: "Jul 2026"
  headline: "See your whole hunt on one page — the goal, the gap, the plan."
  body: "A new private page pulls everything Hope knows about you into one clear brief: the role you're aiming for, how ready you are, what's left to close, and the projects that'll get you there. Open it anytime to see exactly where you stand."

- date: "Jul 2026"
  headline: "Know exactly what to build next — and what to skip."
  body: "Once Hope knows the gap between you and the job, it now picks the one or two real things worth building to close it — with a plan you can start this week. It also tells you plainly what's a waste of your time, like another certificate or a private coding grind nobody will ever see."

- date: "Jul 2026"
  headline: "Get an honest read on how close you are to the job you want."
  body: "Hope now checks your fit against real, current job postings and tells you the truth — kindly. You and Hope agree on what's actually between you and the role before anything else happens, so the plan that follows is one you actually believe in. It always ends by naming what you're already great at."

- date: "Jul 2026"
  headline: "Browse all six portfolio looks in one place, and pick yours."
  body: "A new page lays out every Hope portfolio style side by side, with a live preview you can flip through nine different people. No ranking, no 'best for' labels — just the six looks, so you can choose the one that feels like you."

- date: "Jul 2026"
  headline: "Try your portfolio in six looks, and in the dark."
  body: "Every example portfolio now has a floating style dock in the corner — flip between six distinct looks and switch light or dark, all without leaving the page. A quick way to see which style fits you before you build your own."

- date: "Jun 2026"
  headline: "See your strengths as one striking picture."
  body: "Your portfolio's skills now open with a clean visual map of your top strengths — shaped to your own line of work, whether you're a chef, a nurse, an electrician, or an engineer. A recruiter takes in what you're great at in a single glance, before reading a word."

- date: "Jun 2026"
  headline: "Your Social Feed looks sharper and never leaves gaps."
  body: "When a social post can't load its live preview, its card now folds into a clean 'View on…' tile instead of leaving an empty box — and when a post does load, we no longer repeat its platform name on top, since the post already shows where it's from. The whole feed reads tidy and deliberate."

- date: "Jun 2026"
  headline: "Optional: let your timeline show its busiest seasons."
  body: "Your career timeline stays clean and flat by default. If you like, you can switch on a subtle backdrop that rises where your busiest stretches were — a quiet hint at how packed each chapter of your career has been."

- date: "Jun 2026"
  headline: "See real portfolios from every kind of career."
  body: "We've opened a gallery of real example portfolios you can explore — a chef, an AI scientist, an advocate, designers, engineers, founders, and more. Whatever your line of work, you can see what yours could look like before you start. Have a browse: agenthope.ai/demo/"

- date: "Jun 2026"
  headline: "Your portfolio comes together more smoothly now."
  body: "We've smoothed out the building so it works more reliably whether you use Claude, ChatGPT, or another AI you already have. Fewer hiccups, a cleaner result, less back-and-forth to get there."

- date: "Jun 2026"
  headline: "Building your portfolio with ChatGPT just got easier."
  body: "ChatGPT can now put your whole portfolio together too — not just Claude. When it's ready, one short guided step that you do puts it online and gives you your link. We walk you through it with a picture, so the last step stays simple."

- date: "Jun 2026"
  headline: "Hope now learns your goal and your timeline."
  body: "When you start, it asks what role you're aiming for, how much time you can give the hunt, and how much runway you have. A few months and a few weeks call for very different plans — now yours actually fits your life, not a generic template."

- date: "Jun 2026"
  headline: "Your wins finally stand out on your portfolio."
  body: "Scholarships, honors, and standout achievements now show up as highlights on your education — not just a degree and a date. The things you're proud of get the spotlight they earned."

- date: "Jun 2026"
  headline: "Ready-to-paste instructions for the AI you already use."
  body: "Copy a tuned set of instructions for Claude or ChatGPT straight from the home page and go — no guesswork about what to say."
